<!DOCTYPE html>
<html>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.8">
  <title>Bloxians</title>
  <body>
    <div style="font-family: Arial, sans-serif;" class="one">Bloxians</div>
    <input style="font-family: Arial, sans-serif" placeholder="Search" type="username" id="searh" />
  </body>
  <style>
  .one, .search {
    box-sizing: border-box;
    outline: 1px solid red;
  }
  body {
  }
  .one {
    z-index: 1;
    font-size: 117%;
    height: 40%;
    width: 100%;
  }
  #searh {
    z-index: 2;
    position: fixed;
    top: 1%;
    left: 20%;
  }
  </style>
  <script>
  let query = new URLSearchParams(window.location.search);
  let valUea = query.get("texta");
  document.getElementById("searh").value = valUea;
  document.getElementById("searh").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      let text = document.getElementById("searh").value;
      window.location.href = "https://main-bloxiansCOM.github.io/index.html?texta=" + text;
    };
  });
  </script>
</html>
